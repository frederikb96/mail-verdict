name: mv-test

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: mv-app-test
    # Override dev entrypoint to disable --reload (source mounts trigger restarts mid-test)
    entrypoint: ["/bin/bash", "-c"]
    command: ["uv pip install --system --no-deps -e . 2>/dev/null || true && alembic upgrade head 2>/dev/null || true && exec python -m mail_verdict"]
    ports:
      - "18080:8080"
    volumes:
      - ./src:/app/src:Z
      - ./config:/app/config:ro,Z
      - ./alembic:/app/alembic:ro,Z
      - ./alembic.ini:/app/alembic.ini:ro,Z
      - ./ui/build:/app/ui/build:ro,Z
    env_file:
      - .env
    environment:
      MAIL_VERDICT_DATABASE_URL: "postgresql+asyncpg://testuser:testpass@postgres:5432/mail_verdict_test"
      MAIL_VERDICT_QDRANT_HOST: "qdrant"
      MAIL_VERDICT_QDRANT_PORT: "6333"
    userns_mode: keep-id
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      stalwart:
        condition: service_healthy
      postimap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: "no"

  postimap:
    image: ghcr.io/frederikb96/postimap:0.2.1
    container_name: mv-postimap-test
    env_file:
      - .env
    environment:
      POSTIMAP_DATABASE_HOST: postgres
      POSTIMAP_DATABASE_PORT: "5432"
      POSTIMAP_DATABASE_NAME: mail_verdict_test
      POSTIMAP_DATABASE_USER: testuser
      DB_PASSWORD: testpass
      POSTIMAP_IMAP_TLS_REJECT_UNAUTHORIZED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  stalwart:
    image: docker.io/stalwartlabs/mail-server:v0.11.8
    container_name: mv-stalwart-test
    ports:
      - "1025:2525"
      - "1143:1143"
      - "8880:8080"
    environment:
      STALWART_ADMIN_PASSWORD: testadmin123
    userns_mode: keep-id
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - /tmp/mv-test-stalwart:/opt/stalwart-mail:Z
      - ./docker/stalwart-test.toml:/opt/stalwart-mail/etc/config.toml:ro,Z
    restart: "no"

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: mv-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mail_verdict_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d mail_verdict_test"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - /tmp/mv-test-pgdata:/var/lib/postgresql/data:Z
    restart: "no"

  qdrant:
    image: docker.io/qdrant/qdrant:v1.16.3
    container_name: mv-qdrant-test
    ports:
      - "16334:6333"
    environment:
      QDRANT__LOG_LEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - /tmp/mv-test-qdrant:/qdrant/storage:Z
    restart: "no"
