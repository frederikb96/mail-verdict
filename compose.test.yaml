name: mv-test

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: mv-app-test
    ports:
      - "18080:8080"
    volumes:
      - ./src:/app/src:Z
      - ./config:/app/config:ro,Z
      - ./alembic:/app/alembic:ro,Z
      - ./alembic.ini:/app/alembic.ini:ro,Z
    env_file:
      - .env
    environment:
      MAIL_VERDICT_CONFIG_PATH: /app/config/config.test.yaml
    userns_mode: keep-id
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      stalwart:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: "no"

  stalwart:
    image: docker.io/stalwartlabs/mail-server:v0.11.4
    container_name: mv-stalwart-test
    ports:
      - "1025:25"
      - "1143:143"
      - "1993:993"
      - "8880:8080"
    environment:
      STALWART_ADMIN_PASSWORD: testadmin123
    userns_mode: keep-id
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - /tmp/mv-test-stalwart:/opt/stalwart-mail:Z
      - ./docker/stalwart-test.toml:/opt/stalwart-mail/etc/config.toml:ro,Z
    restart: "no"

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: mv-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mail_verdict_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    userns_mode: keep-id
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d mail_verdict_test"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - /tmp/mv-test-pgdata:/var/lib/postgresql/data:Z
    restart: "no"

  qdrant:
    image: docker.io/qdrant/qdrant:v1.16.3
    container_name: mv-qdrant-test
    ports:
      - "16334:6333"
    environment:
      QDRANT__LOG_LEVEL: WARN
    userns_mode: keep-id
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - /tmp/mv-test-qdrant:/qdrant/storage:Z
    restart: "no"
