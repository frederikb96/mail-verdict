name: mail-verdict-dev

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: mail-verdict-dev
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src:Z
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    env_file:
      - .env
    environment:
      - MAIL_VERDICT_DATABASE_URL=postgresql+asyncpg://mail_verdict:mail_verdict@postgres:5432/mail_verdict
      - MAIL_VERDICT_QDRANT_HOST=qdrant
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: mail-verdict-postgres-dev
    ports:
      - "5432:5432"
    volumes:
      - /tmp/mail-verdict-pgdata:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_DB: mail_verdict
      POSTGRES_USER: mail_verdict
      POSTGRES_PASSWORD: mail_verdict
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_verdict -d mail_verdict"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: mail-verdict-qdrant-dev
    ports:
      - "6333:6333"
    volumes:
      - /tmp/mail-verdict-qdrant:/qdrant/storage:Z
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
