# MailVerdict Infrastructure Configuration
#
# This file contains ONLY infrastructure settings (requires restart).
# Application settings (AI, spam, sync, retry) are stored in the database
# and managed via the API.
#
# Override: ~/.config/mail-verdict/mail-verdict.yaml or MAIL_VERDICT_<SECTION>_<KEY> env vars

server:
  host: 0.0.0.0
  port: 8080
  log_level: INFO
  cors_origins:
    - http://localhost:5173

database:
  url: ""
  pool_size: 10
  max_overflow: 5

qdrant:
  host: localhost
  port: 6333
  collection_name: mail_embeddings
