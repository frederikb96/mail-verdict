# MailVerdict Test Configuration
#
# Used by the app container in compose.test.yaml.
# Configures a test IMAP account pointing to the Stalwart container.

server:
  host: 0.0.0.0
  port: 8080
  log_level: DEBUG
  cors_origins: []

accounts:
  - name: alice-test
    host: stalwart
    port: 993
    username: alice@test.local
    password: testpass123
    ssl_verify: false
    folders:
      - INBOX
    idle_folders:
      - INBOX
    smtp_host: stalwart
    smtp_port: 25

database:
  url: postgresql+asyncpg://testuser:testpass@postgres:5432/mail_verdict_test
  pool_size: 5
  max_overflow: 2

qdrant:
  host: qdrant
  port: 6333
  collection_name: mail_verdict_test

ai:
  provider: openai
  model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  embedding_dimensions: 1536

spam:
  enabled: true
  excerpt_length: 300
  neighbor_count: 3
  auto_mark_read: true
  system_prompt: |
    You are a spam analyst. Analyze the email and similar past emails.
    Return JSON: {verdict: 'spam' or 'not-spam'}

sync:
  poll_interval_seconds: 10
  idle_enabled: false
  idle_restart_seconds: 30
  lookback_days: 1
  auto_detect_folders: false

retry:
  max_retries: 2
  base_delay_seconds: 0.5
  max_delay_seconds: 2.0
  exponential_base: 2.0

mcp:
  enabled: false
  port: 8766
  transport: streamable-http

rules: []
