# Stalwart test configuration for E2E tests
# Allows plain-text IMAP/SMTP auth (testing only, never for production)

[server.listener.smtp]
bind = "[::]:2525"
protocol = "smtp"

[server.listener.imap]
bind = "[::]:1143"
protocol = "imap"

[server.listener.http]
protocol = "http"
bind = "[::]:8080"

[storage]
data = "rocksdb"
fts = "rocksdb"
blob = "rocksdb"
lookup = "rocksdb"
directory = "internal"

[store.rocksdb]
type = "rocksdb"
path = "/opt/stalwart-mail/data"
compression = "lz4"

[directory.internal]
type = "internal"
store = "rocksdb"

[tracer.log]
type = "log"
level = "info"
path = "/opt/stalwart-mail/logs"
prefix = "stalwart.log"
rotate = "daily"
ansi = false
enable = true

[session.auth]
mechanisms = "[plain, login]"
allow-plain-text = true

[imap.auth]
mechanisms = "[plain, login]"
allow-plain-text = true

[authentication]
require-tls = false

[authentication.fallback-admin]
user = "admin"
secret = "testadmin123"

# Disable rate limits for E2E testing
[session.rcpt]
max-recipients = 10000

[queue.throttle.outbound]
enable = false
